name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installable zip
        run: |
          set -euo pipefail
          PLUGIN_SLUG=salient-custom-elements
          STAGING="$(mktemp -d)"
          mkdir -p "${STAGING}/${PLUGIN_SLUG}"

          rsync -a \
            --exclude-from=.distignore \
            --exclude='.git' \
            ./ "${STAGING}/${PLUGIN_SLUG}/"

          (cd "${STAGING}" && zip -r "${GITHUB_WORKSPACE}/salient-custom-elements.zip" "${PLUGIN_SLUG}")

          echo "Archive contents:"
          unzip -l salient-custom-elements.zip

      - name: Verify dev files are excluded
        run: |
          set -euo pipefail
          ! unzip -l salient-custom-elements.zip | grep -E '\.github/|/tools/|/\.ci/|phpcs\.xml\.dist|README\.md'

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: salient-custom-elements.zip
          generate_release_notes: true
