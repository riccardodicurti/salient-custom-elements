name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: wp-cli

      - name: Install dist-archive command
        run: wp package install wp-cli/dist-archive-command:@stable

      - name: Build installable zip
        run: |
          wp dist-archive . salient-custom-elements.zip --plugin-dirname=salient-custom-elements
          echo "Archive contents:"
          unzip -l salient-custom-elements.zip

      - name: Verify dev files are excluded
        run: |
          ! unzip -l salient-custom-elements.zip | grep -E '\.github/|/tools/|/\.ci/|phpcs\.xml\.dist|README\.md'

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: salient-custom-elements.zip
          generate_release_notes: true
